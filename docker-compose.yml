services:
  # Database and Infrastructure Services
  db:
    image: postgres:15
    container_name: user_db
    restart: always
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - fitness_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d fitness_user_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fitness-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fitness_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: activityservice-db
    restart: always
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - fitness_network
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_USERNAME}", "--password", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "localhost:27017/test", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: always
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/fitness_user_db
      KC_DB_USERNAME: ${POSTGRES_USERNAME}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - fitness_network
    depends_on:
      db:
        condition: service_healthy

  # Microservices - Startup Order: Eureka -> Config Server -> Rest Services

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 10s
      timeout: 10s
      retries: 5

  config-server:
    build:
      context: ./configurationserver
      dockerfile: Dockerfile
    container_name: config-server
    restart: always
    ports:
      - "8888:8888"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 30s
      retries: 6

  api-gateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "9090:9090"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
      - spring.config.import=optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    links:
      - eureka
      - config-server

  user-service:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    container_name: user-service
    restart: always
    ports:
      - "8081:8081"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
      - spring.config.import=optional:configserver:http://config-server:8888
      - spring.datasource.url=jdbc:postgresql://db:5432/fitness_user_db
      - spring.datasource.username=${POSTGRES_USERNAME}
      - spring.datasource.password=${POSTGRES_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      db:
        condition: service_healthy
    links:
      - eureka
      - config-server
      - db

  activity-service:
    build:
      context: ./activityservice
      dockerfile: Dockerfile
    container_name: activity-service
    restart: always
    ports:
      - "8082:8082"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
      - spring.config.import=optional:configserver:http://config-server:8888
      - spring.mongodb.uri=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/activity_database?authSource=admin
      - spring.rabbitmq.host=rabbitmq
      - spring.rabbitmq.port=5672
      - spring.rabbitmq.username=guest
      - spring.rabbitmq.password=guest
    depends_on:
      config-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    links:
      - eureka
      - config-server
      - mongodb
      - rabbitmq

  ai-service:
    build:
      context: ./aiservice
      dockerfile: Dockerfile
    container_name: ai-service
    restart: always
    ports:
      - "8083:8083"
    networks:
      - fitness_network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
      - spring.config.import=optional:configserver:http://config-server:8888
      - spring.mongodb.uri=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/ai_database?authSource=admin
      - spring.rabbitmq.host=rabbitmq
      - spring.rabbitmq.port=5672
      - spring.rabbitmq.username=guest
      - spring.rabbitmq.password=guest
      - gemini.api.key=${GEMINI_API_KEY}
      - gemini.api.url=${GEMINI_API_URL}
    depends_on:
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    links:
      - eureka
      - config-server
      - rabbitmq

networks:
  fitness_network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data: